<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roblox Words Cheatsheet</title>
  <link rel="icon" type="image/x-icon" href="icon2.jpg">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap");
    :root{
      --bg0:#050507; --bg1:#0a0a0f; --bg2:#12121b;
      --card: rgba(255,255,255,0.055);
      --border: rgba(255,255,255,0.12);
      --text:#f1f3ff; --muted:rgba(241,243,255,.62);
      --shadow: 0 18px 55px rgba(0,0,0,.60);
      --shadow2: 0 12px 28px rgba(0,0,0,.45);
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    html, body{ height:100%; }
    body{
      font-family:"Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 520px at 15% -10%, rgba(255,255,255,.06), transparent 60%),
        radial-gradient(900px 480px at 90% 0%, rgba(255,255,255,.04), transparent 55%),
        radial-gradient(900px 480px at 55% 120%, rgba(255,255,255,.035), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 45%, var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 16px;
    }

    .card{
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      overflow:hidden;
    }

    .head{
      padding: 22px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.02);
      display:flex;
      gap: 14px;
      align-items:center;
    }

    .icon-wrap{
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 10px 22px rgba(0,0,0,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      overflow:hidden;
    }
    .icon-wrap img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display:block;
    }

    .title h1{
      font-size: 1.65rem;
      font-weight: 950;
      letter-spacing: -0.7px;
      line-height: 1.05;
      color: rgba(255,255,255,.92);
    }
    .title p{
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.55;
      max-width: 70ch;
    }

    .body{
      padding: 18px 22px 22px;
      display:flex;
      flex-direction:column;
      gap: 12px;
    }

    /* TWO-BUTTON ROW (left-right) */
    .btn-row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 14px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.05);
      color: rgba(241,243,255,.92);
      text-decoration:none;
      font-weight: 950;
      transition: transform .14s ease, background .14s ease, border-color .14s ease, box-shadow .14s ease;
      min-height: 64px;
    }
    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.075);
      border-color: rgba(255,255,255,.22);
      box-shadow: var(--shadow2);
    }
    .btn .meta{
      font-size: 0.78rem;
      color: rgba(241,243,255,.66);
      font-weight: 800;
      margin-top: 3px;
    }
    .pill{
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 950;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(241,243,255,.75);
      white-space:nowrap;
      flex-shrink:0;
    }

    .tips{
      margin-top: 2px;
      display:flex;
      gap: 10px;
      flex-wrap:wrap;
      color: rgba(241,243,255,.62);
      font-size: 0.82rem;
      font-weight: 850;
    }
    .tip{
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      padding: 8px 12px;
    }

    .foot{
      padding: 14px 22px 18px;
      border-top: 1px solid rgba(255,255,255,.10);
      color: rgba(241,243,255,.55);
      font-size: 0.78rem;
      line-height: 1.45;
      background: rgba(255,255,255,.02);
    }

    code{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.92em;
      color: rgba(241,243,255,.72);
    }

    /* Responsive: stack buttons on mobile */
    @media (max-width: 640px){
      .btn-row{ grid-template-columns: 1fr; }
    }
    @media (max-width: 520px){
      body{ padding: 12px; }
      .card{ border-radius: 22px; }
      .head{ padding: 18px; gap: 12px; }
      .icon-wrap{ width: 46px; height: 46px; border-radius: 14px; }
      .title h1{ font-size: 1.40rem; }
      .body{ padding: 16px 18px 18px; }
      .foot{ padding: 12px 18px 16px; }
      .btn{ padding: 13px 13px; border-radius: 18px; }
    }
    
    .btn-left{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .btn-icon{
      width:42px;
      height:42px;
      border-radius:12px;
      object-fit:cover;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.05);
    }
  </style>
</head>
<body>
  <main class="card">
    <header class="head">
      <div class="icon-wrap">
        <img src="icon.jpg" alt="Sambung icon" />
      </div>
      <div class="title">
        <h1>Cheatsheet Roblox</h1>
        <p>
          Sambung Kata & Last Letter
        </p>
      </div>
    </header>

    <section class="body">
  <div class="btn-row">
  
    <a class="btn" href="./id/">
      <div class="btn-left">
        <img src="sk.png" alt="ID Icon" class="btn-icon">
        <div>
          Sambung Kata
          <div class="meta">Versi Indonesia</div>
        </div>
      </div>
      <span class="pill">Buka →</span>
    </a>
  
    <a class="btn" href="./en/">
      <div class="btn-left">
        <img src="lt.png" alt="EN Icon" class="btn-icon">
        <div>
          Last Letter
          <div class="meta">English Version</div>
        </div>
      </div>
      <span class="pill">Open →</span>
    </a>
  
  </div>
    </section>

    <footer class="foot">
      Sambung Kata: <code>71.437+ Kata</code>, Last Letter: <code>1.057.099+ Words<code>.
    </footer>
  </main>
</body>
</html>
